<style>
:root{
  --bg:#0D000D;--surface:#111315;--surface-2:#1B1E22;--surface-3:#222222;
  --jade:#0E2B22;--jade-bright:#3FA383;--gold:#D4A017;--gold-dim:#2A2210;
  --stone:#F2EDE2;--stone-dim:#A29E93;--crimson:#8D2323;--steel:#7A7A7A;
  --line:rgba(245,243,236,0.08);--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--stone);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:80px;}
/* Nav styles in chinthe.css */

.wrap{max-width:1100px;margin:0 auto;padding:0 20px;}
.page-header{padding:48px 0 32px;}
.page-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:var(--jade-bright);text-transform:uppercase;margin-bottom:10px;}
.page-title{font-family:'Oswald',sans-serif;font-size:clamp(40px,8vw,72px);text-transform:uppercase;letter-spacing:0.02em;line-height:1;margin-bottom:10px;}
.page-sub{font-size:14px;color:var(--stone-dim);line-height:1.6;max-width:520px;}

/* Controls */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--line);}
.search-box{
  flex:1;min-width:200px;
  background:var(--surface);border:1px solid var(--line);border-radius:8px;
  color:var(--stone);font-family:'Inter',sans-serif;font-size:14px;
  padding:10px 14px;outline:none;
}
.search-box:focus{border-color:var(--jade-bright);}
.search-box::placeholder{color:var(--stone-dim);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{
  background:var(--surface);border:1px solid var(--line);color:var(--stone-dim);
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;
  padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;
}
.filter-btn.active{background:var(--stone);color:var(--bg);border-color:var(--stone);font-weight:600;}
.filter-btn.cat-submission.active{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.filter-btn.cat-position.active{background:var(--jade-bright);color:var(--bg);border-color:var(--jade-bright);}
.filter-btn.cat-pass.active{background:var(--steel);color:var(--stone);border-color:var(--steel);}
.filter-btn.cat-sweep.active{background:#6B5CE7;color:var(--stone);border-color:#6B5CE7;}
.filter-btn.cat-takedown.active{background:var(--crimson);color:var(--stone);border-color:var(--crimson);}
.filter-btn.cat-defence.active{background:#B5462F;color:var(--stone);border-color:#B5462F;}

/* Results count */
.results-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--stone-dim);letter-spacing:0.06em;margin-bottom:20px;}

/* Grid */
.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

/* Cards */
.tech-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  cursor:pointer;overflow:hidden;transition:border-color .2s,transform .15s;
  position:relative;
}
.tech-card:hover{border-color:rgba(245,243,236,0.18);transform:translateY(-2px);}
.tech-card-accent{height:2px;width:100%;}
.cat-submission .tech-card-accent{background:var(--gold);}
.cat-position .tech-card-accent{background:var(--jade-bright);}
.cat-pass .tech-card-accent{background:var(--steel);}
.cat-sweep .tech-card-accent{background:#6B5CE7;}
.cat-takedown .tech-card-accent{background:var(--crimson);}
.cat-defence .tech-card-accent{background:#B5462F;}

.tech-card-body{padding:18px 20px 20px;}
.tech-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tech-badge{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;
}
.cat-submission .tech-badge{background:var(--gold-dim);color:var(--gold);}
.cat-position .tech-badge{background:var(--jade);color:var(--jade-bright);}
.cat-pass .tech-badge{background:rgba(92,122,133,0.15);color:var(--steel);}
.cat-sweep .tech-badge{background:rgba(107,92,231,0.15);color:#6B5CE7;}
.cat-takedown .tech-badge{background:rgba(141,35,35,0.18);color:var(--crimson);}
.cat-defence .tech-badge{background:rgba(181,70,47,0.15);color:#B5462F;}

.tech-card-name{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:0.02em;text-transform:uppercase;line-height:1;margin-bottom:6px;}
.tech-card-tagline{font-size:13px;color:var(--stone-dim);line-height:1.4;margin-bottom:12px;}
.tech-card-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--stone-dim);border:1px solid var(--line);border-radius:4px;padding:2px 7px;}

/* Expanded detail */
.tech-detail{display:none;padding:16px 20px 20px;border-top:1px solid var(--line);}
.tech-detail.open{display:block;}
.detail-section{margin-bottom:14px;}
.detail-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--stone-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
.detail-text{font-size:13.5px;line-height:1.6;color:var(--stone);}
.detail-text.mistake{color:#E86868;}
.close-btn{
  margin-top:16px;background:none;border:1px solid var(--line);color:var(--stone-dim);
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  padding:7px 14px;border-radius:6px;cursor:pointer;
}

@media(max-width:640px){
  .nav-links{display:none;}
  .knowledge-grid{grid-template-columns:1fr;}
}

/* ── DESKTOP IMPROVEMENTS ── */
@media(min-width:960px){
  .nav-inner{padding:16px 40px;}
  .nav-wordmark{font-size:22px;}
  .nav-link{font-size:12px;padding:8px 16px;}

  .wrap{max-width:none;padding:0 40px;}
  .page-header{padding:60px 0 40px;}
  .page-title{font-size:clamp(52px,6vw,96px);}
  .page-sub{font-size:15px;max-width:600px;}

  .search-box{font-size:15px;padding:12px 18px;}
  .filter-btn{font-size:11px;padding:10px 18px;}

  .knowledge-grid{grid-template-columns:repeat(3,1fr);gap:18px;}
  .tech-card-name{font-size:24px;}
  .tech-card-tagline{font-size:14px;}
  .detail-text{font-size:14px;}
}

@media(min-width:1280px){
  .wrap{padding:0 60px;}
  .knowledge-grid{grid-template-columns:repeat(4,1fr);}
}

@media(min-width:1600px){
  .knowledge-grid{grid-template-columns:repeat(5,1fr);}
}
</style>

const DB = [

    id:"rnc", cat:"submission",

    tagline:"The highest-percentage finish in modern no-gi. Your default finishing target from back control.",

  {

    tags:["Guard","Mount","Chain Submission"],
    objective:"Push one arm across and pull the head down simultaneously. Both actions at the same time — sequential movement telegraphs the entry.",
    mechanics:"Push the arm across their centerline (outside your leg) while pulling the head down. Open guard and swing the outside leg over the neck. Lock figure-four: outside ankle behind inside knee. Squeeze knees, pull head down, push hips up. Adjust for the tap — rotate toward the trapped arm if needed.",

    defense:"Hand-fighting or posting to create space. Lift-and-drive counter (lifts to break grip).",

  {
    id:"heel_hook_inside", cat:"submission",

    defense:"TAP EARLY. Heel hook damage (ACL, LCL, popliteal) occurs in fractions of a second before pain registers. There is no halfway.",

    mechanics:"Forearm blade across the Achilles tendon, lock the grip (gable or kimura grip), extend the hips while keeping the ankle hyperextended. Extension, not rotation. Legal at all ADCC levels.",
    defense:"Rolling with the direction of extension. Hip escape to pull the foot out.",
    mistake:"Over-committing to the finish when they're already rolling. Follow the roll and upgrade to inside heel hook instead of fighting the escape.",

  {

  {

    tagline:"The backup when the triangle leg can't cross. Forces the same shoulder rotation through hip mechanics.",
    tags:["Guard","Shoulder Lock","Sweep Setup"],
    objective:"Use it as a sweep threat if the finish isn't available. An omoplata that forces a roll still scores 2 points.",

    drill:"Omoplata leg placement: from guard, partner at 50%, groove the leg path over the shoulder 10 reps before adding the sit-up."
  },
  // ── POSITIONS ──────────────────────────────────────────────────
  {
    id:"back_control", cat:"position",

let activeCat = "all";
let searchQ = "";

function renderCards(){
  const grid = document.getElementById("grid");
  const meta = document.getElementById("resultsMeta");
  const filtered = DB.filter(t=>{
    const catMatch = activeCat==="all" || t.cat===activeCat;
    const q = searchQ.toLowerCase();
    const textMatch = !q ||
      t.name.toLowerCase().includes(q) ||
      t.tagline.toLowerCase().includes(q) ||
      (t.tags||[]).some(tg=>tg.toLowerCase().includes(q)) ||
      (t.mechanics||"").toLowerCase().includes(q) ||
      (t.objective||"").toLowerCase().includes(q) ||
      (t.defense||"").toLowerCase().includes(q) ||
      (t.mistake||"").toLowerCase().includes(q) ||
      (t.drill||"").toLowerCase().includes(q);
    return catMatch && textMatch;
  });
  meta.textContent = `${filtered.length} technique${filtered.length!==1?"s":""}`;
  // Remember which card is expanded so re-rendering (typing, filtering) doesn't collapse it
  const openEl = document.querySelector(".tech-detail.open");
  const openId = openEl ? openEl.id.replace("detail-","") : null;
  grid.innerHTML = "";
  filtered.forEach(t=>{
    const card = document.createElement("div");
    card.className = `tech-card cat-${t.cat}`;
    card.innerHTML = `
      <div class="tech-card-accent"></div>
      <div class="tech-card-body">
        <div class="tech-card-meta">
          <span class="tech-badge">${t.cat.charAt(0).toUpperCase()+t.cat.slice(1)}</span>
        </div>
        <div class="tech-card-name">${t.name}</div>
        <div class="tech-card-tagline">${t.tagline}</div>
        <div class="tech-card-tags">${(t.tags||[]).map(tg=>`<span class="tag">${tg}</span>`).join("")}</div>
      </div>
      <div class="tech-detail" id="detail-${t.id}">
        ${t.objective?`<div class="detail-section"><div class="detail-label">Objective</div><div class="detail-text">${t.objective}</div></div>`:""}
        ${t.mechanics?`<div class="detail-section"><div class="detail-label">Mechanics</div><div class="detail-text">${t.mechanics}</div></div>`:""}
        ${t.defense?`<div class="detail-section"><div class="detail-label">Opponent Reactions</div><div class="detail-text" style="color:var(--stone-dim)">${t.defense}</div></div>`:""}
        ${t.mistake?`<div class="detail-section"><div class="detail-label">Common Mistake</div><div class="detail-text mistake">${t.mistake}</div></div>`:""}
        ${t.drill?`<div class="detail-section"><div class="detail-label">Drill</div><div class="detail-text">${t.drill}</div></div>`:""}
        <button class="close-btn" onclick="event.stopPropagation();closeCard('${t.id}')">✕ Close</button>
      </div>
    `;
    const body = card.querySelector(".tech-card-body");
    body.setAttribute("role","button");
    body.tabIndex = 0;
    body.setAttribute("aria-controls",`detail-${t.id}`);
    body.onclick = ()=>toggleCard(t.id);
    body.onkeydown = e=>{
      if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleCard(t.id);}
    };
    grid.appendChild(card);
  });
  if(openId){
    const d = document.getElementById(`detail-${openId}`);
    if(d) d.classList.add("open");
  }
  syncExpanded();
}

function syncExpanded(){
  document.querySelectorAll(".tech-card-body[aria-controls]").forEach(b=>{
    const d = document.getElementById(b.getAttribute("aria-controls"));
    b.setAttribute("aria-expanded", d && d.classList.contains("open") ? "true" : "false");
  });
}

function toggleCard(id){
  const detail = document.getElementById(`detail-${id}`);
  if(!detail) return;
  const isOpen = detail.classList.contains("open");
  document.querySelectorAll(".tech-detail.open").forEach(d=>d.classList.remove("open"));
  if(!isOpen) detail.classList.add("open");
  syncExpanded();
}
function closeCard(id){
  const d = document.getElementById(`detail-${id}`);
  if(d) d.classList.remove("open");
  syncExpanded();
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    renderCards();
  };
});
document.getElementById("searchInput").addEventListener("input",e=>{
  searchQ = e.target.value;
  renderCards();
});

renderCards();
</script>
<script src="chinthe.js"></script>
</body>
</html>
